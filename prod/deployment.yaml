apiVersion: apps/v2
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-app
  template:
    metadata:
      labels:
        app: production-app
    spec:
      containers:
      - name: production-container
        image: europe-west1-docker.pkg.dev/qwiklabs-gcp-04-c05d513edd11/my-repository/hello-cloudbuild:v2.0
        ports:
        - containerPort: 8080
